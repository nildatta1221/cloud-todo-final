name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - "frontend-app/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-app
          push: true
          tags: nildatta123/todolist-frontend-ai:${{ github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: todolist-cluster
          location: us-east4-c
          project_id: cisc5550-491418

      - name: Update Kubernetes deployment
        run: |
          kubectl set image deployment/todolist-frontend todolist-frontend=nildatta123/todolist-frontend-ai:${{ github.sha }}
          kubectl rollout status deployment/todolist-frontend